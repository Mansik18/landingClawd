<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Настройка бота — ClawdCloud</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 0.75rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 520px;
      margin: 1rem;
    }
    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #c4b5fd;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 0.88rem;
      margin-bottom: 1.5rem;
    }
    .step {
      background: #14172200;
      border: 1px solid #2d3148;
      border-radius: 0.5rem;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .step-num {
      display: inline-block;
      width: 1.5rem;
      height: 1.5rem;
      background: #6d28d9;
      color: #fff;
      border-radius: 50%;
      text-align: center;
      line-height: 1.5rem;
      font-size: 0.75rem;
      font-weight: 700;
      margin-right: 0.5rem;
    }
    .step h3 {
      display: inline;
      font-size: 0.92rem;
      font-weight: 600;
    }
    .step p {
      color: #94a3b8;
      font-size: 0.83rem;
      margin-top: 0.5rem;
      line-height: 1.45;
    }
    .step code {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 0.25rem;
      padding: 0.15rem 0.4rem;
      font-family: ui-monospace, monospace;
      font-size: 0.82rem;
      color: #a78bfa;
    }
    label {
      display: block;
      color: #94a3b8;
      font-size: 0.85rem;
      margin-bottom: 0.35rem;
      margin-top: 1.25rem;
    }
    input[type=text] {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 0.4rem;
      color: #e2e8f0;
      padding: 0.6rem 0.8rem;
      font-size: 0.9rem;
      font-family: ui-monospace, monospace;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #7c3aed; }
    .btn {
      display: block;
      width: 100%;
      padding: 0.7rem;
      margin-top: 1.5rem;
      background: #6d28d9;
      color: #fff;
      border: 1px solid #7c3aed;
      border-radius: 0.4rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      color: #fca5a5;
      background: #3f1515;
      border: 1px solid #991b1b;
      padding: 0.5rem 0.75rem;
      border-radius: 0.35rem;
      font-size: 0.82rem;
      margin-top: 1rem;
      display: none;
    }
    .info {
      color: #93c5fd;
      background: #1e3a5f;
      border: 1px solid #1d4ed8;
      padding: 0.5rem 0.75rem;
      border-radius: 0.35rem;
      font-size: 0.82rem;
      margin-top: 1rem;
      display: none;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="card">
    <div style="text-align:center;margin-bottom:1rem">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none"><defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs><path d="M22.5 13.2a5.5 5.5 0 00-10.6-1.5A4 4 0 008 15.5a4 4 0 004 4h9.5a3.5 3.5 0 001-6.3z" fill="url(#lg)"/><path d="M17 12.5l-3 4.5h2.5L15.5 21l4-5h-2.5z" fill="#fff"/></svg>
    </div>
    <h1>Настройка бота</h1>
    <p class="subtitle">Подключите вашего Telegram бота к ClawdCloud</p>

    <div class="step">
      <span class="step-num">1</span>
      <h3>Создайте бота</h3>
      <p>Откройте <a href="https://t.me/BotFather" target="_blank" rel="noopener" style="color:#a78bfa;text-decoration:underline">@BotFather</a> в Telegram и отправьте команду <code>/newbot</code>. Следуйте инструкциям для создания нового бота.</p>
    </div>

    <div class="step">
      <span class="step-num">2</span>
      <h3>Скопируйте токен</h3>
      <p>BotFather выдаст токен в формате <code>123456789:ABCdefGHI...</code>. Скопируйте его и вставьте ниже.</p>
    </div>

    <form id="onboardingForm">
      <label for="botToken">Токен бота</label>
      <input type="text" id="botToken" name="botToken" required
             placeholder="123456789:ABCdefGHIjklMNOpqrsTUVwxyz..."
             autocomplete="off" spellcheck="false">

      <div class="error" id="error"></div>
      <div class="info" id="info"></div>

      <button type="submit" class="btn" id="submitBtn">Подключить бота</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('onboardingForm');
    const errorEl = document.getElementById('error');
    const infoEl = document.getElementById('info');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      infoEl.style.display = 'none';

      const botToken = document.getElementById('botToken').value.trim();

      if (!/^\d+:[A-Za-z0-9_-]{35,}$/.test(botToken)) {
        errorEl.textContent = 'Некорректный формат токена. Формат: 123456789:ABCdef...';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Создаём контейнер...';
      infoEl.textContent = 'Это может занять 20-30 секунд...';
      infoEl.style.display = 'block';

      try {
        const res = await fetch('/onboarding', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
          body: JSON.stringify({ botToken }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Ошибка подключения');
        }

        window.location.href = data.redirect || '/dashboard';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        infoEl.style.display = 'none';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Подключить бота';
      }
    });
  </script>
</body>
</html>
